---
- name: Setup Java and Tomcat
  hosts: app_servers
  become: yes

  vars:
    tomcat_version: "9.0.85"
    tomcat_install_dir: "/opt/tomcat"

  tasks:

    - name: Install Java 11
      dnf:
        name: java-11-amazon-corretto
        state: present

    - name: Download Apache Tomcat
      get_url:
        url: "https://downloads.apache.org/tomcat/tomcat-9/v{{ tomcat_version }}/bin/apache-tomcat-{{ tomcat_version }}.tar.gz"
        dest: "/tmp/tomcat.tar.gz"
        mode: '0644'

    - name: Extract Tomcat
      unarchive:
        src: "/tmp/tomcat.tar.gz"
        dest: "/opt/"
        remote_src: yes

    - name: Create symlink
      file:
        src: "/opt/apache-tomcat-{{ tomcat_version }}"
        dest: "{{ tomcat_install_dir }}"
        state: link
        force: yes

    - name: Create Tomcat systemd service
      copy:
        dest: /etc/systemd/system/tomcat.service
        content: |
          [Unit]
          Description=Apache Tomcat 9
          After=network.target

          [Service]
          Type=forking
          User=root
          Group=root
          Environment="JAVA_HOME=/usr/lib/jvm/java-11-amazon-corretto"
          Environment="CATALINA_HOME={{ tomcat_install_dir }}"
          ExecStart={{ tomcat_install_dir }}/bin/startup.sh
          ExecStop={{ tomcat_install_dir }}/bin/shutdown.sh
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd and start Tomcat
      systemd:
        name: tomcat
        daemon_reload: yes
        enabled: yes
        state: started

    - name: Confirm Tomcat is running
      uri:
        url: "http://localhost:8080"
        status_code: 200
      retries: 5
      delay: 5